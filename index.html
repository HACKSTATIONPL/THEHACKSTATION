<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VUE-PS ULTIMATE 13.50</title>
    <style>
        :root { --main-green: #00ff41; --dim-green: #003b00; }
        body { background-color: #000; color: var(--main-green); font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #wrapper { width: 90%; max-width: 900px; border: 1px solid var(--main-green); padding: 20px; background: rgba(0, 5, 0, 0.95); box-shadow: 0 0 30px var(--dim-green); position: relative; }
        
        /* Styl nagłówka */
        .header { text-align: center; border-bottom: 1px solid var(--dim-green); padding-bottom: 10px; margin-bottom: 20px; }
        .glitch { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; }

        /* Konsola logowania */
        #console { height: 300px; overflow-y: hidden; font-size: 14px; line-height: 1.6; border-left: 2px solid var(--dim-green); padding-left: 15px; }
        .log-entry { margin-bottom: 5px; opacity: 0.9; }
        .white { color: #fff; }
        .danger { color: #ff3e3e; }

        /* Menu na dole */
        .footer { margin-top: 30px; display: flex; justify-content: space-around; border-top: 1px solid var(--dim-green); padding-top: 20px; }
        .cmd-btn { border: 1px solid var(--main-green); padding: 10px 20px; background: transparent; color: var(--main-green); font-size: 16px; cursor: pointer; transition: 0.3s; }
        .cmd-btn:hover { background: var(--main-green); color: #000; }
        
        /* Animacja skanowania */
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 65, 0.1); position: absolute; top: 0; left: 0; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="wrapper">
        <div class="header">
            <div class="glitch">VUE-PS SYSTEM LOADER</div>
            <div id="fw-info">FW: 13.50 | STATUS: <span class="white">IDLE</span></div>
        </div>

        <div id="console">
            <div class="log-entry">> Initializing core modules...</div>
            <div class="log-entry">> Checking system privileges... <span class="white">[OK]</span></div>
            <div class="log-entry">> Ready for input.</div>
        </div>

        <div class="footer">
            <div class="cmd-btn" id="btn-x">PRESS (X) EXPLOIT</div>
            <div class="cmd-btn" id="btn-sq">PRESS (□) LOAD HEN</div>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');
        
        function addLog(text, className = '') {
            const div = document.createElement('div');
            div.className = 'log-entry ' + className;
            div.innerHTML = `> ${text}`;
            consoleEl.appendChild(div);
            // Przewijanie na dół
            if (consoleEl.children.length > 12) consoleEl.removeChild(consoleEl.firstChild);
        }

        // Symulacja ataku
        function runExploit() {
            addLog("Uruchamianie procedury łamania WebKit...", "white");
            setTimeout(() => addLog("Skanowanie adresów pamięci..."), 500);
            setTimeout(() => addLog("Wykryto niestabilność w procesie WebContent", "danger"), 1500);
            setTimeout(() => addLog("Próba wstrzyknięcia LoadBina...", "white"), 2500);
            setTimeout(() => addLog("ERROR: Race Condition Failed. Retrying...", "danger"), 4000);
        }

        function runHEN() {
            addLog("Ładowanie modułu HEN prosto ze strony...", "white");
            setTimeout(() => addLog("Pobieranie pakietów: [||||||----] 60%"), 800);
            setTimeout(() => addLog("Pobieranie pakietów: [||||||||||] 100%", "white"), 1600);
            setTimeout(() => addLog("Oczekiwanie na Kernel Access...", "danger"), 2500);
        }

        // Obsługa sterowania padem/klawiaturą
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runExploit(); // Przycisk X
            if (e.key === 's' || e.key === 'S') runHEN(); // Przycisk Kwadrat
        });

        // Obsługa kliknięcia (dla myszki w przeglądarce PS4)
        document.getElementById('btn-x').onclick = runExploit;
        document.getElementById('btn-sq').onclick = runHEN;
    </script>
</body>
</html>
