<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VUE-PS ULTIMATE ENGINE</title>
    <style>
        :root {
            --green: #00ff41;
            --dark-green: #003b00;
            --bg-color: #000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--green);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #terminal {
            width: 90%;
            max-width: 850px;
            height: 80vh;
            border: 1px solid var(--dark-green);
            background: rgba(0, 10, 0, 0.95);
            padding: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Nagłówek z info o RAM */
        .header {
            border-bottom: 1px solid var(--dark-green);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        /* Obszar logów */
        #console {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            scrollbar-width: none; /* Ukrywa scroll na PS4 */
        }

        .log-entry {
            margin: 4px 0;
            line-height: 1.4;
        }

        .white { color: #fff; }
        .danger { color: #ff3e3e; }
        .blink { animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0; } }

        /* Przyciski na dole */
        .footer {
            border-top: 1px solid var(--dark-green);
            padding-top: 15px;
            display: flex;
            justify-content: space-around;
        }

        .btn-hint {
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        .btn-key {
            color: #fff;
            border: 1px solid var(--green);
            padding: 2px 8px;
            margin-right: 5px;
        }

        /* Efekt skanowania starego monitora */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="scanline"></div>
        
        <div class="header">
            <div>VUE-PS [STAGE: STAGING]</div>
            <div id="fw-info">FW: 13.50 | JS RAM: 0MB</div>
        </div>

        <div id="console">
            <div class="log-entry">> Initializing VUE-PS Kernel Environment...</div>
            <div class="log-entry">> WebKit Engine: PlayStation 4</div>
            <div class="log-entry white">> WAITING FOR TRIGGER...</div>
        </div>

        <div class="footer">
            <div class="btn-hint"><span class="btn-key">X</span> START EXPLOIT</div>
            <div class="btn-hint"><span class="btn-key">&#9633;</span> AUTO-HEN</div>
        </div>
    </div>

    <script src="exploit.js"></script>

</body>
</html>
